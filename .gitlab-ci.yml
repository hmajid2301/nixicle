image: nixos/nix

stages:
  - deploy

tailscale:
  stage: deploy
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  parallel:
      matrix:
        - HOST:
          - ms01
          - s100
  script:
    - mkdir -p /etc/nix/
    - echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf
    - nix-env -iA nixpkgs.docker nixpkgs.go-task nixpkgs.flyctl nixpkgs.tailscale nixpkgs.jq
    - tailscaled --state="mem:" &
    - tailscale up --authkey=${TAILSCALE_AUTHKEY} --hostname="gitlab-$(cat /etc/hostname)" --accept-routes --accept-dns
    # Get Tailscale IP of target
    - TARGET_IP=$(tailscale status --json | jq -r ".Peer[] | select(.HostName == \"$HOST\") | .TailscaleIPs[0]")
    - echo "Resolved $HOST to $TARGET_IP"
    # Configure SSH for outbound connections only
    - mkdir -p ~/.ssh
    - echo "Host $HOST" >> ~/.ssh/config
    - echo "  HostName $TARGET_IP" >> ~/.ssh/config
    - echo "  User nixos" >> ~/.ssh/config
    - echo "  StrictHostKeyChecking accept-new" >> ~/.ssh/config
    - echo "  UserKnownHostsFile ~/.ssh/known_hosts" >> ~/.ssh/config
    # Trust the host key automatically
    - ssh-keyscan $TARGET_IP >> ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts
    - tailscale set --ssh
    - tailscale status
    - nix profile install github:serokell/deploy-rs
    - tailscale ping $HOST
    - ssh -v vps -l nixos
    - deploy ".#$HOST" --hostname $HOST --ssh-user nixos --skip-checks --confirm-timeout "600" --remote-build

