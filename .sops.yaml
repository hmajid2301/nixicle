# Make a user key
# mkdir -p ~/.config/sops/age
# age-keygen -o ~/.config/sops/age/keys.txt
# chmod 600 ~/.config/sops/age/keys.txt

# Display the user public key:
# age-keygen -y ~/.config/sops/age/keys.txt

# Make a host public key:
# nix-shell -p ssh-to-age
# ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub

# Add secrets
# sops secrets/secrets.yaml

# Rekey secrets.yaml after editing recipients in .sops.yaml:
# sops updatekeys secrets/secrets.yaml
keys:
  - &users:
    - &haseeb_framework age1nfkkq86jk3yhhzgk3jt0kjzfpzv4qee3uheellawzgrmd296gczqa68yt7
    - &haseebmajid_dell age1s6rx9whkkf35t7qaju9vvla8tl2nstt0drx722ca4qadqfx66g0slxyxd0
    - &haseeb_framebox age1zm36rngg07hrm8nj3r8wj5ucz85njxzfwsxftsx3gtdmzkgw3peqh8vf55
    - &haseeb_vm age1x4x5ujnd9em23jhs53lgwqcmw9t6hx64xtdt3x0u4n66fsuygf9s4njjla
    - &haseeb_desktop age1et5u4u20utu2hethuaddhjjnj67p3r43l2jq4e32hm2a0m595qessmakpp
  - &hosts:
    - &framework age16lkhqtnle3z62gy0tk9x4tn3w43st2cnvdpl8r84xpzkn2f7jv8qxl5a9q
    - &vm age1pc0qdk5d2fen55cstvtch588wcqgzemgavlsvsc5dm0r4uw00vrq297et7
    - &framebox age199ny6lhask8zc65auwygqhj0svjkpp5kr7lhht8hvj947vaclecqrt4yg7
    - &vps age1ucucdna4spp5znu0e9fnq3v6qxzwcpp33fh58cll2r074sh8gytssd2jnq
    - &desktop age199ny6lhask8zc65auwygqhj0svjkpp5kr7lhht8hvj947vaclecqrt4yg7
    # nas host key: fill in after first boot with
    #   ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub
    # then `sops updatekeys hosts/nas/secrets.yaml`.
    # - &nas age1REPLACE_ME_AFTER_FIRST_BOOT

creation_rules:
  - path_regex: modules/nixos/secrets.ya?ml$
    key_groups:
    - age:
      - *framework
      - *framebox
      - *vm
      - *vps
      - *desktop
      - *haseeb_desktop
      - *haseeb_framework
      - *haseeb_framebox
      - *haseeb_vm
      - *haseebmajid_dell

  - path_regex: modules/nixos/services/secrets.ya?ml$
    key_groups:
    - age:
      - *framework
      - *framebox
      - *vm
      - *vps
      - *desktop
      - *haseeb_desktop
      - *haseeb_framework
      - *haseeb_framebox
      - *haseeb_vm
      - *haseebmajid_dell

  - path_regex: hosts/framebox/secrets.ya?ml$
    key_groups:
    - age:
      - *framework
      - *framebox
      - *vm
      - *vps
      - *desktop
      - *haseeb_desktop
      - *haseeb_framework
      - *haseeb_framebox
      - *haseebmajid_dell

  - path_regex: hosts/nas/secrets.ya?ml$
    key_groups:
    - age:
      # Add *nas here once the host key exists (see note above), then rekey.
      - *haseeb_desktop
      - *haseeb_framework
      - *haseeb_framebox
      - *haseebmajid_dell

  - path_regex: hosts/framework/secrets.ya?ml$
    key_groups:
    - age:
      - *framework
      - *framebox
      - *desktop
      - *haseeb_desktop
      - *haseeb_framework
      - *haseeb_framebox
      - *haseebmajid_dell

  - path_regex: hosts/vps/secrets.ya?ml$
    key_groups:
    - age:
      - *framework
      - *framebox
      - *vps
      - *desktop
      - *haseeb_desktop
      - *haseeb_framework
      - *haseeb_framebox
      - *haseebmajid_dell

  - path_regex: hosts/desktop/secrets.ya?ml$
    key_groups:
    - age:
      - *framework
      - *framebox
      - *desktop
      - *haseeb_desktop
      - *haseeb_framework
      - *haseeb_framebox
      - *haseebmajid_dell

  - path_regex: modules/home/secrets.ya?ml$
    key_groups:
    - age:
      - *haseeb_framework
      - *haseeb_framebox
      - *haseeb_vm
      - *haseeb_desktop
      - *haseebmajid_dell

  - path_regex: modules/secrets.ya?ml$
    key_groups:
    - age:
      - *haseeb_framework
      - *haseeb_framebox
      - *haseeb_vm
      - *haseebmajid_dell
      - *haseeb_desktop
